<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pickleball Splitter</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6">
        <h1 class="text-2xl font-bold text-green-700 mb-4">Pickleball Contribution</h1>
        
        <div class="mb-4">
            <label class="block text-gray-700">Total Amount (₹)</label>
            <input type="number" id="totalAmt" class="w-full border p-2 rounded mt-1" placeholder="e.g. 1600">
        </div>

        <div class="flex gap-2 mb-4">
            <input type="text" id="pName" class="flex-1 border p-2 rounded" placeholder="Player Name">
            <input type="number" id="pTime" class="w-20 border p-2 rounded" placeholder="Min">
            <button onclick="addPlayer()" class="bg-green-600 text-white px-4 py-2 rounded">+</button>
        </div>

        <div id="playerList" class="space-y-2 mb-4"></div>

        <button onclick="calculate()" class="w-full bg-green-700 text-white font-bold py-3 rounded-lg shadow-lg">Calculate Split</button>
        
        <div id="results" class="mt-6 space-y-2"></div>

        <button id="shareBtn" onclick="shareToWhatsApp()" class="hidden w-full mt-4 bg-blue-500 text-white py-2 rounded-lg">Share to WhatsApp</button>
    </div>

    <script>
        let players = [];

        function addPlayer() {
            const name = document.getElementById('pName').value;
            const time = document.getElementById('pTime').value;
            if(name && time) {
                players.push({ name, time: parseFloat(time) });
                updateList();
                document.getElementById('pName').value = '';
                document.getElementById('pTime').value = '';
            }
        }

        function updateList() {
            const list = document.getElementById('playerList');
            list.innerHTML = players.map((p, i) => `<div class="flex justify-between bg-gray-50 p-2 rounded text-sm"><span>${p.name}</span><span>${p.time} mins</span></div>`).join('');
        }

        function calculate() {
            const totalAmt = parseFloat(document.getElementById('totalAmt').value);
            const sumTP = players.reduce((sum, p) => sum + p.time, 0);
            const resultsDiv = document.getElementById('results');
            
            let summaryText = "Pickleball Contribution Breakup:\n";

            resultsDiv.innerHTML = '<h2 class="font-bold border-b pb-2">Breakup (Rounded Up)</h2>';
            players.forEach(p => {
                const amount = Math.ceil((totalAmt / sumTP) * p.time);
                resultsDiv.innerHTML += `<div class="flex justify-between py-1"><span>${p.name}</span><span class="font-bold text-green-700">₹${amount}</span></div>`;
                summaryText += `${p.name}: ₹${amount}\n`;
            });
            
            document.getElementById('shareBtn').classList.remove('hidden');
            window.lastSummary = summaryText;
        }

        function shareToWhatsApp() {
            const url = "whatsapp://send?text=" + encodeURIComponent(window.lastSummary);
            window.location.href = url;
        }
    </script>
</body>
</html>
